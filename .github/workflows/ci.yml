name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 114514
          POSTGRES_DB: course
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d course"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:114514@127.0.0.1:5432/course
      REDIS_URL: redis://127.0.0.1:6379/0
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: course-dev-secret-change-me-before-production-2026
      ENROLLMENT_RESULT_API_KEY: course-result-demo-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply database migrations
        run: pnpm exec prisma migrate deploy

      - name: Run tests
        run: pnpm exec vitest run

      - name: Lint
        run: pnpm lint

      - name: Build Next.js
        run: pnpm build

      - name: Inspect k6 script
        run: docker run --rm -v "${{ github.workspace }}:/src" -w /src grafana/k6:latest inspect tests/load/enrollment.js

      - name: Build Docker image
        run: docker build -t course-next-app:ci .
